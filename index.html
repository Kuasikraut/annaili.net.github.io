<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДАДА НЕ УМЕРЛО</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"><circle cx="10" cy="10" r="8" fill="red"/></svg>'), auto;
        }
        
        body {
            font-family: 'Courier Prime', monospace;
            background: #000;
            color: #fff;
            overflow: hidden;
            position: relative;
        }
        
        #videoBackground {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
            z-index: -1;
            filter: grayscale(100%);
        }
        
        .dark-mode #videoBackground {
            display: none;
        }
        
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: rgba(0, 0, 0, 0.7);
        }
        
        .dark-mode .container {
            background: #000;
        }
        
        h1 {
            font-size: 4rem;
            letter-spacing: 15px;
            animation: glitch 2s infinite;
            text-shadow: 3px 3px 0px red, -3px -3px 0px blue;
            margin-bottom: 50px;
        }
        
        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); }
            75% { transform: translate(-2px, -2px); }
        }
        
        .icons-container {
            display: grid;
            grid-template-columns: repeat(3, 200px);
            gap: 40px;
            position: relative;
            z-index: 10;
        }
        
        .icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }
        
        .icon-wrapper:hover {
            transform: scale(1.1) rotate(5deg);
        }
        
        .icon {
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #fff;
            background: rgba(0, 0, 0, 0.8);
            transition: all 0.3s ease;
        }
        
        .icon svg {
            width: 80px;
            height: 80px;
        }
        
        .icon-wrapper:hover .icon {
            border-color: red;
            box-shadow: 0 0 20px red;
        }
        
        .icon-label {
            margin-top: 15px;
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        .eye-bottom {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100px;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s ease;
        }
        
        .eye-bottom:hover {
            transform: translateX(-50%) scale(1.2);
        }
        
        .flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
        }
        
        .chaos-active .icon-wrapper {
            animation: chaosMove 2s infinite;
        }
        
        @keyframes chaosMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(20px, -20px) rotate(90deg); }
            50% { transform: translate(-20px, 20px) rotate(180deg); }
            75% { transform: translate(-20px, -20px) rotate(270deg); }
        }
        
        .chaos-text {
            position: fixed;
            font-size: 3rem;
            color: red;
            animation: textChaos 1s infinite;
            display: none;
            z-index: 100;
        }
        
        .chaos-active .chaos-text {
            display: block;
        }
        
        @keyframes textChaos {
            0% { top: 10%; left: 10%; }
            25% { top: 80%; left: 70%; }
            50% { top: 20%; left: 80%; }
            75% { top: 70%; left: 20%; }
            100% { top: 10%; left: 10%; }
        }
        
        .dark-mode {
            background: #000;
        }
        
        .dark-mode .container {
            background: #000;
        }
    </style>
</head>
<body>
    <video id="videoBackground" autoplay muted loop>
        <source src="background.mp4" type="video/mp4">
    </video>
    
    <div class="flash" id="flash"></div>
    
    <div class="container">
        <h1>ДАДА ЖИВО</h1>
        
        <div class="icons-container">
            <!-- ФОТО -->
            <div class="icon-wrapper" data-page="photo.html">
                <div class="icon">
                    <svg viewBox="0 0 100 100" fill="white">
                        <circle cx="50" cy="50" r="30"/>
                        <circle cx="50" cy="50" r="15" fill="black"/>
                    </svg>
                </div>
                <div class="icon-label">ФОТО</div>
            </div>
            
            <!-- ВИДЕО -->
            <div class="icon-wrapper" data-page="video.html">
                <div class="icon">
                    <svg viewBox="0 0 100 100" fill="white">
                        <polygon points="30,20 30,80 75,50"/>
                    </svg>
                </div>
                <div class="icon-label">ВИДЕО</div>
            </div>
            
            <!-- КВАДРАТ (треугольник с ресничками) -->
            <div class="icon-wrapper" data-page="login.html">
                <div class="icon">
                    <svg viewBox="0 0 100 100" fill="white">
                        <polygon points="50,20 80,70 20,70"/>
                        <!-- Реснички равномерно по верхней стороне -->
                        <line x1="35" y1="45" x2="25" y2="35" stroke="white" stroke-width="2"/>
                        <line x1="43" y1="39" x2="38" y2="27" stroke="white" stroke-width="2"/>
                        <line x1="50" y1="36" x2="50" y2="22" stroke="white" stroke-width="2"/>
                        <line x1="57" y1="39" x2="62" y2="27" stroke="white" stroke-width="2"/>
                        <line x1="65" y1="45" x2="75" y2="35" stroke="white" stroke-width="2"/>
                    </svg>
                </div>
                <div class="icon-label">КВАДРАТ</div>
            </div>
            
            <!-- БЛОГ -->
            <div class="icon-wrapper" data-page="blog.html">
                <div class="icon">
                    <svg viewBox="0 0 100 100" fill="white">
                        <ellipse cx="50" cy="50" rx="35" ry="25"/>
                        <circle cx="50" cy="50" r="12" fill="black"/>
                        <circle cx="50" cy="50" r="6" fill="white"/>
                    </svg>
                </div>
                <div class="icon-label">БЛОГ</div>
            </div>
            
            <!-- МАНИФЕСТ -->
            <div class="icon-wrapper" data-page="manifest.html">
                <div class="icon">
                    <svg viewBox="0 0 100 100" fill="white">
                        <rect x="30" y="20" width="40" height="60"/>
                        <line x1="35" y1="30" x2="65" y2="30" stroke="black" stroke-width="2"/>
                        <line x1="35" y1="40" x2="65" y2="40" stroke="black" stroke-width="2"/>
                        <line x1="35" y1="50" x2="65" y2="50" stroke="black" stroke-width="2"/>
                        <line x1="35" y1="60" x2="55" y2="60" stroke="black" stroke-width="2"/>
                    </svg>
                </div>
                <div class="icon-label">МАНИФЕСТ</div>
            </div>
            
            <!-- ДАС ДАЗАЙН -->
            <div class="icon-wrapper" data-page="design.html">
                <div class="icon">
                    <svg viewBox="0 0 100 100" fill="white">
                        <path d="M 20 50 Q 35 20, 50 50 T 80 50" stroke="white" fill="none" stroke-width="3"/>
                        <circle cx="50" cy="50" r="8"/>
                        <rect x="45" y="60" width="10" height="20"/>
                    </svg>
                </div>
                <div class="icon-label">ДАС ДАЗАЙН</div>
            </div>
            
            <!-- АРХИВЫ -->
            <div class="icon-wrapper" data-page="archive.html">
                <div class="icon">
                    <svg viewBox="0 0 100 100" fill="white">
                        <rect x="25" y="30" width="50" height="50"/>
                        <rect x="30" y="25" width="40" height="5"/>
                        <line x1="35" y1="45" x2="65" y2="45" stroke="black" stroke-width="2"/>
                        <line x1="35" y1="55" x2="65" y2="55" stroke="black" stroke-width="2"/>
                        <line x1="35" y1="65" x2="65" y2="65" stroke="black" stroke-width="2"/>
                    </svg>
                </div>
                <div class="icon-label">АРХИВЫ</div>
            </div>
            
            <!-- ХАОС -->
            <div class="icon-wrapper" id="chaosBtn">
                <div class="icon">
                    <svg viewBox="0 0 100 100" fill="white">
                        <line x1="20" y1="20" x2="80" y2="80" stroke="white" stroke-width="3"/>
                        <line x1="80" y1="20" x2="20" y2="80" stroke="white" stroke-width="3"/>
                        <line x1="50" y1="20" x2="50" y2="80" stroke="white" stroke-width="3"/>
                        <line x1="20" y1="50" x2="80" y2="50" stroke="white" stroke-width="3"/>
                        <circle cx="50" cy="50" r="15" fill="red"/>
                    </svg>
                </div>
                <div class="icon-label">ХАОС</div>
            </div>
            
            <!-- КОНТАКТЫ -->
            <div class="icon-wrapper" data-page="contacts.html">
                <div class="icon">
                    <svg viewBox="0 0 100 100" fill="white">
                        <circle cx="50" cy="35" r="15"/>
                        <path d="M 30 80 Q 30 55, 50 55 T 70 80"/>
                    </svg>
                </div>
                <div class="icon-label">КОНТАКТЫ</div>
            </div>
        </div>
    </div>
    
    <div class="chaos-text">ДАДА ДАДА ДАДА</div>
    
    <svg class="eye-bottom" id="eyeBottom" viewBox="0 0 100 60">
        <ellipse cx="50" cy="30" rx="45" ry="25" fill="white"/>
        <circle cx="50" cy="30" r="15" fill="black"/>
        <circle cx="50" cy="30" r="7" fill="red"/>
    </svg>
    
    <script>
        let darkMode = false;
        let flashInterval = null;
        
        // Переход на страницы
        document.querySelectorAll('.icon-wrapper[data-page]').forEach(wrapper => {
            wrapper.addEventListener('click', function() {
                const page = this.getAttribute('data-page');
                window.location.href = page;
            });
        });
        
        // Кнопка ХАОС
        document.getElementById('chaosBtn').addEventListener('click', function() {
            document.body.classList.toggle('chaos-active');
        });
        
        // Нижний глаз - переключение режима
        document.getElementById('eyeBottom').addEventListener('click', function() {
            darkMode = !darkMode;
            document.body.classList.toggle('dark-mode');
            
            if (darkMode) {
                // Запускаем мигание каждые 30 секунд
                flashInterval = setInterval(() => {
                    const flash = document.getElementById('flash');
                    flash.style.opacity = '1';
                    setTimeout(() => {
                        flash.style.opacity = '0';
                    }, 100);
                }, 30000);
            } else {
                // Останавливаем мигание
                if (flashInterval) {
                    clearInterval(flashInterval);
                    flashInterval = null;
                }
            }
        });
    </script>
</body>
</html>
